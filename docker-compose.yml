services:
  postgres:
    image: postgres:15
    container_name: telegram_warehouse_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_warehouse
    ports:
      - "5433:5432"    # ← changed from 5432:5432 to 5433:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: